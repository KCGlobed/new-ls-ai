version: '3.8'

services:
  # 1. The FastAPI Backend (Uses your backend/Dockerfile)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - redis
      - chromadb

  # 2. The Celery Worker (Uses the SAME backend/Dockerfile, but overrides the command)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "-Q", "ingestion"]
    environment:
      - APP_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - redis
      - chromadb

  # 3. Dedicated ChromaDB Server (Uses the OFFICIAL Chroma image, not your Dockerfile)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  # 4. Redis Server (Message broker for Celery)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  chroma_data:
